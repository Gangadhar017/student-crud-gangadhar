<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container glass-panel">
        <header>
            <h1>🎓 Student Portal</h1>
            <p>Manage your university records</p>
        </header>

        <main>
            <section class="form-section">
                <h2>Add New Student</h2>
                <form id="studentForm">
                    <input type="hidden" id="studentId">
                    <div class="input-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="e.g. Jane Doe">
                    </div>
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="jane@example.com">
                    </div>
                    <div class="input-group">
                        <label for="course">Course / Major</label>
                        <input type="text" id="course" required placeholder="e.g. Computer Science">
                    </div>
                    <button type="submit" class="btn primary-btn" id="submitBtn">Save Student</button>
                    <button type="button" class="btn secondary-btn hidden" id="cancelEditBtn">Cancel</button>
                </form>
            </section>

            <section class="list-section">
                <h2>Enrolled Students</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Course</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast hidden">Message goes here</div>

    <script src="app.js"></script>
</body>
</html>
